<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>System Monitor Terminal</title>
  <style>
    body { background-color: #0b0f19; font-family: monospace; padding: 30px; color: #a0aec0; }
    .panel { padding: 25px; background: #161e2e; border: 1px solid #2d3748; border-radius: 8px; width: 400px; }
    
    /* Outfits handled via classList */
    .alert-mode { border: 2px solid #ef4444; background: linear-gradient(180deg, #161e2e, #2d1515); }
    .badge-dev { color: #3b82f6; font-weight: bold; background-color: #1e293b; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }
    .text-status-error { color: #f87171; text-decoration: underline; }
    .banner-style { background-color: #3b82f6; color: white; padding: 10px; font-weight: bold; margin-bottom: 20px; border-radius: 6px; }
  </style>
</head>
<body>

  <div id="env-banner" hidden>Environment Notice</div>

  <div id="core-panel" class="panel" data-env="production">
    <h2 class="user-display">Placeholder Name</h2>
    <p class="sys-message">System status clear.</p>
    
    <ul id="log-container">
      <li>Initial terminal boot sequence completed.</li>
    </ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
